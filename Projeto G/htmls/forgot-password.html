<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="styleF.css">
</head>
<body>
    <h2>Redefinir Senha</h2>

<form id="formReset">
    <label>Email:</label>
    <input type="email" id="emailReset" required><br>

    <label>Nova senha:</label>
    <input type="password" id="novaSenha" required><br><br>

    <button type="submit">Atualizar senha</button>
</form>
<script>
document.getElementById("formReset").addEventListener("submit", function(event) {
    event.preventDefault();

    const emailDigitado = document.getElementById("emailReset").value;
    const novaSenha = document.getElementById("novaSenha").value;

    const emailSalvo = localStorage.getItem("email");

    // verifica se o email existe
    if(emailDigitado === emailSalvo) {
        localStorage.setItem("senha", novaSenha);

        alert("Senha atualizada com sucesso!");

        // volta pro login
        window.location.href = "index.html";
    } else {
        alert("Email não encontrado!");
    }
});
</script>
</body>
</html>
